<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      SEO / Open Graph / favicon are applied at runtime from src/config/brand.config.ts
      via applyHead() (see src/main.tsx), so this file stays brand-neutral.
      The title below is only a placeholder shown for the first frame before React mounts.
    -->
    <title>Landing Page Template</title>

    <!--
      Google Fonts: DM Sans (hero) + Syne (display) + Inter (body).
      Kept inline so fonts load on first paint (no flash). This URL mirrors
      themeConfig.googleFontsUrl in src/config/theme.config.ts — update both when
      changing fonts.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
